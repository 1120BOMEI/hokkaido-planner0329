<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Family Trip to Hokkaido 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { background-color: #E5F3F7; font-family: 'Noto Sans TC', sans-serif; color: #334155; }
        .app-container { max-width: 480px; margin: 0 auto; min-height: 100vh; background-color: #ffffff; position: relative; padding-bottom: 90px; }
        .header-bg { background-color: #ffffff; position: relative; overflow: hidden; border-bottom-left-radius: 35px; border-bottom-right-radius: 35px; z-index: 10; }
        .header-image-container { width: 100%; height: 250px; overflow: hidden; border-bottom-left-radius: 35px; border-bottom-right-radius: 35px; }
        .header-image-container img { width: 100%; height: 100%; object-fit: cover; }
        .side-tab-bar { position: absolute; bottom: 45px; right: 16px; z-index: 30; display: flex; gap: 8px; }
        .tab-button { width: 40px; height: 40px; border-radius: 99px; display: flex; align-items: center; justify-content: center; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); color: #B3E5FC; }
        .tab-button.active { background-color: #01579B; color: white; }
        .landing-page { position: fixed; inset: 0; background-color: #ffffff; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .start-btn { position: absolute; bottom: 80px; width: 85%; background: rgba(255,255,255,0.95); padding: 20px; border-radius: 99px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; cursor: pointer; border: 1px solid #eee; }
        .fade-leave-active { transition: opacity 0.5s ease; }
        .fade-leave-to { opacity: 0; }
    </style>
</head>
<body>

<div id="app" class="app-container">
    <transition name="fade">
        <div v-if="!isStarted" class="landing-page">
            <img src="./S__457515012_0.jpg" class="w-full h-full object-cover">
            <div @click="isStarted = true" class="start-btn">
                <span class="text-xl font-bold tracking-widest text-slate-700">點擊進入北海道之旅</span>
            </div>
        </div>
    </transition>

    <div v-show="isStarted">
        <div class="header-bg">
            <div class="header-image-container"><img src="./S__457515012_0.jpg"></div>
            <div class="side-tab-bar">
                <button v-for="t in ['itinerary', 'info', 'shopping', 'expenses']" @click="currentTab = t" :class="['tab-button', {active: currentTab === t}]">
                    <i :class="getTabIcon(t)"></i>
                </button>
            </div>
        </div>

        <main class="p-4">
            <div v-if="currentTab === 'itinerary'">
                <div class="flex overflow-x-auto space-x-3 mb-4 sticky top-0 bg-white py-2 z-20">
                    <div v-for="(day, index) in dates" :key="index" @click="selectedDateIndex = index"
                         :class="selectedDateIndex === index ? 'bg-deep-sea-blue text-white' : 'bg-white text-slate-400'"
                         class="flex-shrink-0 w-14 h-16 rounded-xl flex flex-col items-center justify-center border-2 cursor-pointer shadow-sm">
                        <span class="text-xs font-bold">{{ day.weekday }}</span>
                        <span class="text-sm font-bold">{{ day.date }}</span>
                    </div>
                </div>

                <div class="space-y-4">
                    <div v-for="(item, idx) in currentItinerary" :key="item.id" class="bg-white rounded-3xl p-5 border shadow-sm relative">
                        <button @click="deleteItineraryItem(idx)" class="absolute top-4 right-4 text-slate-300 hover:text-red-500">
                            <i class="fa-solid fa-circle-xmark text-xl"></i>
                        </button>
                        
                        <div class="flex items-center mb-2">
                            <div :class="getCategoryColor(item.category)" class="p-2 rounded-full text-white mr-3">
                                <i :class="getCategoryIcon(item.category)"></i>
                            </div>
                            <span class="font-bold text-lg pr-6">{{ item.name }}</span>
                        </div>
                        <p class="text-sm text-slate-500" v-html="item.note.replace(/\n/g, '<br>')"></p>
                    </div>
                </div>
            </div>

            <div v-if="currentTab === 'shopping'">
                <div v-for="item in shoppingItems" :key="item.id" class="bg-white rounded-2xl p-4 border mb-3 flex items-center shadow-sm relative">
                    <div class="w-16 h-16 bg-soft-gray rounded-xl overflow-hidden mr-4">
                        <img v-if="item.image" :src="item.image" class="w-full h-full object-cover">
                    </div>
                    <div class="flex-1">
                        <div class="font-bold text-slate-700">{{ item.name }}</div>
                        <div class="text-xs text-pink-500 font-bold">¥ {{ item.price.toLocaleString() }}</div>
                    </div>
                    <button @click="deleteShoppingItem(item.id)" class="text-slate-300 hover:text-red-500 p-2"><i class="fa-solid fa-circle-xmark text-xl"></i></button>
                </div>
            </div>

            <div v-if="currentTab === 'expenses'">
                <div class="bg-gradient-to-br from-deep-sea-blue to-blue-400 text-white p-6 rounded-3xl mb-6 shadow-lg">
                    <div class="text-3xl font-bold text-center">NT$ {{ totalExpenses.toLocaleString() }}</div>
                </div>
                <div v-for="(exp, index) in expenses" :key="exp.id" class="flex items-center p-4 border-b">
                    <div class="flex-1 font-bold text-slate-700">{{ exp.name }}</div>
                    <div class="text-right mr-4 font-bold">NT$ {{ exp.amount.toLocaleString() }}</div>
                    <button @click="deleteExpense(index)" class="text-slate-300 hover:text-red-500 p-2"><i class="fa-solid fa-circle-xmark text-xl"></i></button>
                </div>
            </div>
            
            <div v-if="currentTab === 'info'">
                <div class="bg-deep-sea-blue text-white p-6 rounded-3xl shadow-lg">
                    <h3 class="font-bold mb-2 text-center text-xl">NT$ {{ Math.round(jpyInput * 0.215).toLocaleString() }}</h3>
                    <input v-model="jpyInput" type="number" class="w-full p-2 rounded bg-white/20 text-white border border-white/30 text-center text-2xl outline-none" placeholder="輸入日幣 ¥">
                </div>
            </div>
        </main>

        <button v-if="currentTab !== 'info'" @click="handleAddClick" class="fixed bottom-6 right-6 w-14 h-14 bg-accent-yellow rounded-full shadow-lg text-deep-sea-blue text-2xl flex items-center justify-center z-40">
            <i class="fa-solid fa-plus"></i>
        </button>
    </div>
</div>

<script>
    const { createApp, ref, computed } = Vue;
    createApp({
        setup() {
            const isStarted = ref(false);
            const currentTab = ref('itinerary');
            const selectedDateIndex = ref(0);
            const jpyInput = ref(0);

            const dates = ref([
                { weekday: '日', date: '3/29' }, { weekday: '一', date: '3/30' },
                { weekday: '二', date: '3/31' }, { weekday: '三', date: '4/1' },
                { weekday: '四', date: '4/2' }, { weekday: '五', date: '4/3' },
                { weekday: '六', date: '4/4' }
            ]);

            const itineraryData = ref({
                0: [{ id: 1, name: "新千歲機場取車", category: "transport", note: "OTS 租車新千歲店" }],
                1: [{ id: 2, name: "小樽水族館", category: "spot", note: "企鵝散步冬季限定" }]
            });

            const shoppingItems = ref([{ id: 1, name: "伴手禮", price: 2000, image: "" }]);
            const expenses = ref([{ id: 1, name: "機票", amount: 85000, category: "flight" }]);

            const currentItinerary = computed(() => itineraryData.value[selectedDateIndex.value] || []);
            const totalExpenses = computed(() => expenses.value.reduce((s, e) => s + e.amount, 0));

            const deleteItineraryItem = (idx) => { if(confirm('要刪除這項行程嗎？')) itineraryData.value[selectedDateIndex.value].splice(idx, 1); };
            const deleteExpense = (index) => { if(confirm('要刪除這筆花費嗎？')) expenses.value.splice(index, 1); };
            const deleteShoppingItem = (id) => { shoppingItems.value = shoppingItems.value.filter(i => i.id !== id); };
            const handleAddClick = () => { alert('開啟新增功能'); };

            const getTabIcon = (t) => ({ itinerary: 'fa-map-location-dot', info: 'fa-circle-info', shopping: 'fa-basket-shopping', expenses: 'fa-coins' }[t] ? 'fa-solid ' + { itinerary: 'fa-map-location-dot', info: 'fa-circle-info', shopping: 'fa-basket-shopping', expenses: 'fa-coins' }[t] : '');
            const getCategoryIcon = (cat) => ({ flight: 'fa-plane', transport: 'fa-car', spot: 'fa-camera' }[cat] || 'fa-location-dot' ? 'fa-solid ' + ({ flight: 'fa-plane', transport: 'fa-car', spot: 'fa-camera' }[cat] || 'fa-location-dot') : '');
            const getCategoryColor = (cat) => ({ flight: 'bg-blue-500', transport: 'bg-slate-500', spot: 'bg-green-500' }[cat] || 'bg-deep-sea-blue');

            return { isStarted, currentTab, selectedDateIndex, dates, currentItinerary, totalExpenses, expenses, shoppingItems, deleteItineraryItem, deleteExpense, deleteShoppingItem, handleAddClick, jpyInput, getTabIcon, getCategoryIcon, getCategoryColor };
        }
    }).mount('#app');
</script>
</body>
</html>
