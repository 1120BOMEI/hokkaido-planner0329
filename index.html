<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Family Trip to Hokkaido 2026</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'snow-white': '#F0FFFF',
                        'ice-blue': '#B3E5FC',
                        'light-snow-blue': '#E5F3F7', 
                        'deep-sea-blue': '#01579B', 
                        'accent-yellow': '#FFD54F', 
                        'soft-gray': '#F5F5F5'
                    }
                }
            }
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { background-color: #E5F3F7; font-family: 'Noto Sans TC', sans-serif; color: #334155; }
        .app-container { max-width: 480px; margin: 0 auto; min-height: 100vh; background-color: #ffffff; box-shadow: 0 0 30px rgba(0, 0, 0, 0.05); position: relative; padding-bottom: 90px; }
        .header-bg { background-color: #ffffff; padding: 0; position: relative; overflow: hidden; border-bottom-left-radius: 35px; border-bottom-right-radius: 35px; z-index: 10; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15); }
        .header-image-container { width: 100%; height: 250px; overflow: hidden; border-bottom-left-radius: 35px; border-bottom-right-radius: 35px; }
        .header-image-container img { width: 100%; height: 100%; object-fit: cover; }
        .snow-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><circle cx="50" cy="50" r="1" fill="%23fff" opacity="0.8"/><circle cx="20" cy="80" r="0.5" fill="%23fff" opacity="0.6"/><circle cx="70" cy="30" r="1.5" fill="%23fff" opacity="0.9"/></svg>'); background-size: 100px 100px; animation: snowfall 10s linear infinite; }
        @keyframes snowfall { to { background-position: 100px 100px; } }
        
        .side-tab-bar { position: absolute; bottom: 45px; right: 16px; z-index: 30; display: flex; flex-direction: row; gap: 8px; }
        
        /* 單一按鈕樣式 */
        .tab-button { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.125rem; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15); transition: all 0.2s ease; background-color: #ffffff; color: #B3E5FC; cursor: pointer; border: none; outline: none; }
        .tab-button.active { background-color: #01579B; color: #ffffff; box-shadow: 0 6px 15px rgba(1, 87, 155, 0.4); transform: scale(1.05); }

        .app-main { padding-top: 25px !important; position: relative; z-index: 5; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .card-shadow { box-shadow: 0 4px 20px rgba(179, 229, 252, 0.3); }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .note-content { max-height: 2.5rem; overflow: hidden; }
        .note-content.expanded { max-height: 500px; }
        .expenses-banner { background: linear-gradient(135deg, #01579B 0%, #0097A7 100%); }
        .date-selector-sticky { background-color: #ffffff; border-bottom: 1px solid #f0f0f0; z-index: 20; top: 0; }
        
        /* 封面頁專屬樣式 */
        .landing-page { position: fixed; inset: 0; background-color: #ffffff; z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .start-btn { position: absolute; bottom: 80px; width: 85%; background-color: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); padding: 20px; border-radius: 99px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); font-weight: bold; font-size: 1.25rem; transition: 0.3s; z-index: 1000; border: 1px solid white; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; text-decoration: none; color: #334155; }
        .fade-exit-active { transition: opacity 0.5s ease; }
        .fade-exit-to { opacity: 0; }
        
        .modal-overlay { position: fixed; inset: 0; background-color: rgba(0,0,0,0.5); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

<div id="app" class="app-container">

    <transition name="fade-exit">
        <div v-if="!isStarted" class="landing-page">
            <img src="./S__457515012_0.jpg" class="w-full h-full object-cover">
            <button @click="isStarted = true" class="start-btn flex items-center justify-center rounded-full shadow-2xl">
                <i class="fa-regular fa-snowflake text-ice-blue text-2xl"></i>
                <span class="text-xl font-bold tracking-widest text-slate-700">點擊開始旅程</span>
                <i class="fa-regular fa-snowflake text-ice-blue text-2xl"></i>
            </button>
        </div>
    </transition>

    <div v-if="isStarted" class="animate-fade-in">
        <div class="header-bg relative">
            <div class="header-image-container relative">
                <img src="./S__457515012_0.jpg">
            </div>
            
            <div class="snow-layer"></div> 
            
            <div class="side-tab-bar">
                <button v-for="t in ['itinerary', 'info', 'shopping', 'expenses']" :key="t" @click="currentTab = t" :class="{'tab-button': true, 'active': currentTab === t}">
                    <i :class="getTabIcon(t)"></i>
                </button>
            </div>
        </div>

        <main class="p-4 app-main">
            <div v-if="showModal" class="modal-overlay" @click.self="showModal = false">
                </div>
        </main>

        <button v-if="currentTab !== 'info'" @click="openAddModal" class="fixed bottom-6 right-6 w-14 h-14 bg-accent-yellow rounded-full fab-shadow text-deep-sea-blue text-2xl z-40">
            <i class="fa-solid fa-plus"></i>
        </button>
    </div>
</div>

<script>
    const { createApp, ref, computed } = Vue;
    createApp({
        setup() {
            // 控制封面開關
            const isStarted = ref(false);
            
            // 以下請完全使用你 Google Docs 裡的 setup() 原始碼內容
            const currentTab = ref('itinerary');
            const selectedDateIndex = ref(0);
            const showModal = ref(false);

            const dates = ref([
                { weekday: '日', date: '3/29' }, { weekday: '一', date: '3/30' },
                { weekday: '二', date: '3/31' }, { weekday: '三', date: '4/1' },
                { weekday: '四', date: '4/2' }, { weekday: '五', date: '4/3' },
                { weekday: '六', date: '4/4' }
            ]);

            // ... 這裡請貼上你原本 docs 裡所有的 itinerariesByDate, shoppingItems, expenses 等數據 ...

            const openAddModal = () => {
                showModal.value = true;
            };

            const getTabIcon = (tab) => {
                const icons = { itinerary: 'fa-map-location-dot', info: 'fa-circle-info', shopping: 'fa-basket-shopping', expenses: 'fa-coins' };
                return 'fa-solid ' + icons[tab];
            };

            return { 
                isStarted, currentTab, selectedDateIndex, dates, showModal, openAddModal, getTabIcon
                /* 請在此回傳你原本 docs 裡所有的變數 */
            };
        }
    }).mount('#app');
</script>
</body>
</html>
