<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hokkaido 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { background-color: #E5F3F7; font-family: sans-serif; }
        .app-container { max-width: 480px; margin: 0 auto; min-height: 100vh; background: white; padding-bottom: 50px; }
        .tab-btn { flex: 1; padding: 15px; text-align: center; color: #ccc; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: #01579B; border-bottom: 2px solid #01579B; font-weight: bold; }
    </style>
</head>
<body>

<div id="app" class="app-container">
    <div class="relative w-full h-56">
        <img src="./S__457515012_0.jpg" class="w-full h-full object-cover">
        <div class="absolute bottom-4 left-4 text-white font-bold text-2xl shadow-sm">Hokkaido 2026</div>
    </div>

    <div class="flex border-b">
        <div @click="currentTab = 'itinerary'" :class="['tab-btn', {active: currentTab === 'itinerary'}]"><i class="fa-solid fa-calendar-day"></i></div>
        <div @click="currentTab = 'info'" :class="['tab-btn', {active: currentTab === 'info'}]"><i class="fa-solid fa-circle-info"></i></div>
        <div @click="currentTab = 'shopping'" :class="['tab-btn', {active: currentTab === 'shopping'}]"><i class="fa-solid fa-cart-shopping"></i></div>
        <div @click="currentTab = 'expenses'" :class="['tab-btn', {active: currentTab === 'expenses'}]"><i class="fa-solid fa-coins"></i></div>
    </div>

    <main class="p-4">
        <div v-show="currentTab === 'itinerary'">
            <div class="flex gap-2 overflow-x-auto pb-4">
                <button v-for="(d, i) in dates" @click="dayIdx = i" :class="['px-4 py-2 rounded-lg border', dayIdx === i ? 'bg-blue-600 text-white' : 'bg-gray-100']">
                    {{ d }}
                </button>
            </div>
            <div class="space-y-3 mt-4">
                <div v-for="(item, idx) in itinerary[dayIdx]" class="p-3 border rounded-lg flex justify-between items-center">
                    <div><b>{{ item.name }}</b><br><small class="text-gray-500">{{ item.note }}</small></div>
                    <button @click="itinerary[dayIdx].splice(idx, 1)" class="text-red-300"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>
            <div class="mt-6 p-4 bg-gray-50 rounded-xl border-dashed border-2">
                <input v-model="addName" placeholder="行程名稱" class="w-full p-2 mb-2 border rounded">
                <input v-model="addNote" placeholder="備註" class="w-full p-2 mb-2 border rounded">
                <button @click="doAdd('itinerary')" class="w-full py-2 bg-blue-500 text-white rounded font-bold">+ 新增行程</button>
            </div>
        </div>

        <div v-show="currentTab === 'info'">
            <div class="bg-blue-50 p-6 rounded-2xl text-center">
                <div class="text-gray-500 mb-2">日幣換算台幣 (0.215)</div>
                <div class="text-3xl font-bold text-blue-800 mb-4">NT$ {{ Math.round(jpy * 0.215).toLocaleString() }}</div>
                <input v-model.number="jpy" type="number" class="w-full p-3 border rounded-xl text-center text-xl" placeholder="輸入日幣金額">
            </div>
        </div>

        <div v-show="currentTab === 'shopping'">
            <div v-for="(item, idx) in shopping" class="p-3 border-b flex justify-between">
                <span>{{ item.name }} (¥{{ item.price }})</span>
                <button @click="shopping.splice(idx, 1)" class="text-red-300"><i class="fa-solid fa-trash"></i></button>
            </div>
            <div class="mt-6 p-4 bg-gray-50 rounded-xl">
                <input v-model="addName" placeholder="品名" class="w-full p-2 mb-2 border rounded">
                <input v-model.number="addVal" type="number" placeholder="日幣 ¥" class="w-full p-2 mb-2 border rounded">
                <button @click="doAdd('shopping')" class="w-full py-2 bg-pink-500 text-white rounded font-bold">+ 加入清單</button>
            </div>
        </div>

        <div v-show="currentTab === 'expenses'">
            <div class="text-2xl font-bold text-center mb-4 text-blue-900">總花費: NT$ {{ totalExp.toLocaleString() }}</div>
            <div v-for="(item, idx) in expenses" class="p-3 border-b flex justify-between">
                <span>{{ item.name }} (NT${{ item.amount }})</span>
                <button @click="expenses.splice(idx, 1)" class="text-red-300"><i class="fa-solid fa-trash"></i></button>
            </div>
            <div class="mt-6 p-4 bg-gray-50 rounded-xl">
                <input v-model="addName" placeholder="項目" class="w-full p-2 mb-2 border rounded">
                <input v-model.number="addVal" type="number" placeholder="台幣 NT$" class="w-full p-2 mb-2 border rounded">
                <button @click="doAdd('expenses')" class="w-full py-2 bg-green-600 text-white rounded font-bold">+ 新增花費</button>
            </div>
        </div>
    </main>
</div>

<script>
    const { createApp, ref, computed } = Vue;
    createApp({
        setup() {
            const currentTab = ref('itinerary');
            const dayIdx = ref(0);
            const jpy = ref(0);
            const dates = ['3/29', '3/30', '3/31', '4/1', '4/2', '4/3', '4/4'];
            
            // 資料
            const itinerary = ref({0:[], 1:[], 2:[], 3:[], 4:[], 5:[], 6:[]});
            const shopping = ref([]);
            const expenses = ref([]);

            // 新增用的暫存
            const addName = ref('');
            const addNote = ref('');
            const addVal = ref(0);

            const totalExp = computed(() => expenses.value.reduce((s, i) => s + i.amount, 0));

            const doAdd = (type) => {
                if (!addName.value) return alert('請輸入名稱');
                if (type === 'itinerary') itinerary.value[dayIdx.value].push({ name: addName.value, note: addNote.value });
                if (type === 'shopping') shopping.value.push({ name: addName.value, price: addVal.value });
                if (type === 'expenses') expenses.value.push({ name: addName.value, amount: addVal.value });
                addName.value = ''; addNote.value = ''; addVal.value = 0;
            };

            return { currentTab, dayIdx, dates, jpy, itinerary, shopping, expenses, addName, addNote, addVal, totalExp, doAdd };
        }
    }).mount('#app');
</script>
</body>
</html>
